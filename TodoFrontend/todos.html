<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>Your Todos</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <h2>Your Todos</h2>

      <div id="todo-list" class="todo-cards">

      <div class="add-todo">

        <button onclick="addTodo()">Add</button>
      </div>
    </div>

    <div>
      <iframe
        title="IT Support Ticket Dash Board"
        width="600"
        height="373.5"
        src="https://app.powerbi.com/view?r=eyJrIjoiNjEzYTc1YWEtMjMwNi00YWU3LWEwODctODgxYmMzOGEyNDMxIiwidCI6IjgwOGNjODNlLWE1NDYtNDdlNy1hMDNmLTczYTFlYmJhMjRmMyIsImMiOjEwfQ%3D%3D"
        frameborder="0"
        allowfullscreen="true"
      ></iframe>
    </div>

    <script src="script.js"></script>
  </body>
</html>
